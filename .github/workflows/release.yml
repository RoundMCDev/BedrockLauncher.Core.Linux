name: .NET Core Desktop

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    env:
      PRE_MC_KEY: ${{ secrets.PRE_MC_KEY }}
      REL_MC_KEY: ${{ secrets.REL_MC_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild.exe
        uses: microsoft/setup-msbuild@v2

      - name: Launch Build
        run: dotnet build BedrockLauncher.Core.Linux -c Release --runtime win-x64

      - name: Publish BedrockLauncher.Core.Linux
        uses: brandedoutcast/publish-nuget@v2.5.2
        with:
          PROJECT_FILE_PATH: BedrockLauncher.Core.Linux/BedrockLauncher.Core.Linux.csproj
          NUGET_KEY: ${{ secrets.NUGET_API_KEY }}